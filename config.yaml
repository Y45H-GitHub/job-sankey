# ── Portal queries ─────────────────────────────────────────────────
# High-precision queries for specific job portals.
# Each entry searches a known sender + subject pattern.
#
# company_extractor types:
#   linkedin_sent  — parses "your application was sent to <Company>"
#   workday_sender — extracts company from <company>@myworkday.com
#   subject_regex  — uses regex to extract company from subject line
#   static:<Name>  — always returns <Name> as the company

portals:
  - label: "LinkedIn Easy Apply"
    query: 'from:jobs-noreply@linkedin.com subject:"your application was sent"'
    company_extractor: linkedin_sent

  - label: "Workday"
    query: 'from:myworkday.com subject:"application"'
    company_extractor: workday_sender

  - label: "Workday Thank You"
    query: 'from:myworkday.com subject:"thank you"'
    company_extractor: workday_sender

  - label: "Greenhouse"
    query: 'from:greenhouse-mail.io subject:"applying"'
    company_extractor: subject_regex
    regex: 'applying to (.+?)(?:\s*$|\s*[-|!])'

  - label: "Lever"
    query: 'from:lever.co subject:"application"'
    company_extractor: subject_regex
    regex: 'application to (.+?)(?:\s*$|\s*[-|])'

# ── Manual entries ─────────────────────────────────────────────────
# Add applications that aren't tracked via email.
# status: Applied | Online Assessment / Test | Interviewing | Rejected | Offer
# stages_reached: comma-separated list (applied,oa,interview,offer)

manual_entries: []
  # Example:
  # - company: "Acme Corp"
  #   status: "Offer"
  #   stages_reached: "applied,interview,offer"

# ── Sankey diagram appearance ──────────────────────────────────────

sankey:
  title: "Job Application Funnel"
  colors:
    "Total Applied": "rgba(31, 119, 180, 0.85)"
    "OA / Test": "rgba(255, 187, 40, 0.85)"
    "Interview": "rgba(44, 160, 101, 0.85)"
    "Rejected / Ghosted": "rgba(214, 39, 40, 0.85)"
    "Offer": "rgba(23, 190, 207, 0.85)"
    "No Offer Yet": "rgba(255, 152, 48, 0.85)"
    "Awaiting OA Result": "rgba(148, 103, 189, 0.85)"
