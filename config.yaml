# ─────────────────────────────────────────────────────────────────────
# job-sankey configuration
# Edit this file to customise the tool for your own job search.
# ─────────────────────────────────────────────────────────────────────

# ── General settings ────────────────────────────────────────────────

# How far back (in days) to search your Gmail
lookback_days: 365

# Applications with no response after this many days are marked "Ghosted"
ghosted_threshold_days: 30

# ── Output ──────────────────────────────────────────────────────────

output:
  csv_file: output/applications.csv
  html_file: output/job_search_sankey.html

# ── Gmail search keywords ──────────────────────────────────────────
# Each keyword generates a separate Gmail API search query.
# More keywords = more coverage, but slower.

search_keywords:
  # Application acknowledgements
  - "application received"
  - "thank you for applying"
  - "thanks for applying"
  - "thank you for your application"
  - "we received your application"
  - "your application has been received"
  - "application is being reviewed"
  - "thank you for your interest"
  - "received your application"
  - "your application was sent"
  - "application has been submitted"
  - "successfully submitted"
  - "applied to"
  - "application status"
  - "application update"
  # Interview
  - "interview invitation"
  - "interview schedule"
  - "phone screen"
  # Online assessment
  - "technical assessment"
  - "online assessment"
  - "coding challenge"
  - "coding test"
  - "hackerrank"
  - "codility"
  # Rejection
  - "unfortunately"
  - "we regret"
  - "not moving forward"
  - "decided not to"
  - "will not be moving forward"
  - "position has been filled"
  # Offer
  - "offer letter"
  - "we are pleased to offer"

# ── Blocked domains ────────────────────────────────────────────────
# Emails from these domains are NEVER job applications.
# Add any domains that send you newsletters, product updates, etc.

