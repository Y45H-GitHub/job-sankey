  # Coding practice / communities
  - leetcode.com
  - codeforces.com
  - daily.dev
  - boot.dev
  - quora.com
  - quine.sh
  - hackerearth.com
  # Developer tools
  - docker.com
  - notify.docker.com
  - netlify.com
  - ngrok.com
  - m.ngrok.com
  - railway.app
  - notify.railway.app
  - stackblitz.com
  - github.com
  - getpostman.com
  - grammarly.com
  - mail.grammarly.com
  # Social media
  - facebookmail.com
  - facebook.com
  # Certificates / Badges
  - givemycertificate.com
  - certifier.io
  - holopin.io
  # Marketing / Newsletter platforms
  - beehiiv.com
  - mail.beehiiv.com
  - dare2compete.news
  - unstop.news
  # Hackathon / Competition platforms
  - hack2skill.com
